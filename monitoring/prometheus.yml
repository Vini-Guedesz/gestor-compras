# Configuração global do Prometheus
global:
  scrape_interval: 15s      # Intervalo de coleta de métricas
  evaluation_interval: 15s  # Intervalo de avaliação de regras
  external_labels:
    monitor: 'gestor-compras-monitor'
    environment: 'production'

# Configuração de scrape (coleta de métricas)
scrape_configs:
  # ========================================
  # SPRING BOOT APPLICATION
  # ========================================
  - job_name: 'gestor-compras-backend'
    metrics_path: '/actuator/prometheus'
    scrape_interval: 5s  # Coleta a cada 5 segundos
    static_configs:
      - targets: ['backend:8081']
        labels:
          # Label 'application' usada nos Dashboards do Grafana
          application: 'gestor-compras'
          instance: 'backend-prod'
          environment: 'prod'

  # ========================================
  # PROMETHEUS SELF-MONITORING
  # ========================================
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
        labels:
          application: 'prometheus'

  # ========================================
  # POSTGRESQL EXPORTER
  # ========================================
  - job_name: 'postgresql'
    scrape_interval: 10s
    static_configs:
      - targets: ['postgres-exporter:9187']
        labels:
          application: 'postgresql'
          database: 'gestorcomprasbackend'
          instance: 'postgres-main'

  # ========================================
  # NODE EXPORTER - Métricas do Sistema Operacional
  # ========================================
  - job_name: 'node'
    scrape_interval: 10s
    static_configs:
      - targets: ['node-exporter:9100']
        labels:
          instance: 'host-machine'
          application: 'node-exporter'
