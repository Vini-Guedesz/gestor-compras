# ==============================================================================
# DOCKER COMPOSE - PRODUÇÃO
# Gestor de Compras - Deploy Completo
# ==============================================================================
# Serviços:
# - PostgreSQL (banco de dados)
# - Backend (Spring Boot API)
# - Frontend (Vue.js + Nginx)
# - Nginx Reverse Proxy (80/443)
# - Prometheus + Grafana (monitoramento)
# ==============================================================================

version: '3.8'

services:
  # ============================================================================
  # BANCO DE DADOS - PostgreSQL
  # ============================================================================
  postgres:
    image: postgres:16-alpine
    container_name: gestor-compras-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: gestorcompras_prod
      POSTGRES_USER: gestorcompras_user
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./backups:/backups
    networks:
      - gestor-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gestorcompras_user -d gestorcompras_prod"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ============================================================================
  # BACKEND - Spring Boot API
  # ============================================================================
  backend:
    build:
      context: ./gestor-compras-backend
      dockerfile: Dockerfile
    container_name: gestor-compras-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      # Banco de Dados
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/gestorcompras_prod
      SPRING_DATASOURCE_USERNAME: gestorcompras_user
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD}
      
      # JWT
      JWT_SECRET: ${JWT_SECRET}
      
      # Profile e Porta
      SPRING_PROFILES_ACTIVE: prod
      SERVER_PORT: 8081
      
      # CORS - permitir acesso do frontend
      CORS_ALLOWED_ORIGINS: http://45.55.186.12,https://45.55.186.12,http://localhost
      
      # Performance
      JAVA_OPTS: -Xmx1g -Xms512m
      SPRING_DATASOURCE_HIKARI_MAXIMUM_POOL_SIZE: 20
      SPRING_DATASOURCE_HIKARI_MINIMUM_IDLE: 10
      
      # Logs
      LOGGING_LEVEL_ROOT: INFO
      LOGGING_LEVEL_COM_GESTORDECOMPRAS: INFO
    ports:
      - "8081:8081"
    volumes:
      - backend-logs:/app/logs
    networks:
      - gestor-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8081/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # ============================================================================
  # FRONTEND - Vue.js + Nginx
  # ============================================================================
  frontend:
    build:
      context: ./gestor-compras-frontend/vue-project
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: http://45.55.186.12:8081
    container_name: gestor-compras-frontend
    restart: unless-stopped
    depends_on:
      - backend
    networks:
      - gestor-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:80/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ============================================================================
  # NGINX REVERSE PROXY
  # ============================================================================
  nginx-proxy:
    image: nginx:1.25-alpine
    container_name: gestor-compras-nginx-proxy
    restart: unless-stopped
    depends_on:
      - frontend
      - backend
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - nginx-cache:/var/cache/nginx
    networks:
      - gestor-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:80/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ============================================================================
  # MONITORAMENTO - Prometheus
  # ============================================================================
  prometheus:
    image: prom/prometheus:latest
    container_name: gestor-compras-prometheus
    restart: unless-stopped
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--web.enable-lifecycle'
    networks:
      - gestor-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:9090/-/healthy"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ============================================================================
  # MONITORAMENTO - Grafana
  # ============================================================================
  grafana:
    image: grafana/grafana:latest
    container_name: gestor-compras-grafana
    restart: unless-stopped
    depends_on:
      - prometheus
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_SERVER_ROOT_URL: http://45.55.186.12:3000
    volumes:
      - grafana-data:/var/lib/grafana
      - ./monitoring/grafana/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./monitoring/grafana/datasources:/etc/grafana/provisioning/datasources:ro
    networks:
      - gestor-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3

# ==============================================================================
# VOLUMES
# ==============================================================================
volumes:
  postgres-data:
    driver: local
  backend-logs:
    driver: local
  prometheus-data:
    driver: local
  grafana-data:
    driver: local
  nginx-cache:
    driver: local

# ==============================================================================
# NETWORKS
# ==============================================================================
networks:
  gestor-network:
    driver: bridge
