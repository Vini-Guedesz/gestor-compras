version: '3.8'

services:
  # ========================================
  # PROMETHEUS - Coleta e armazena métricas
  # ========================================
  prometheus:
    image: prom/prometheus:latest
    container_name: gestor-compras-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--web.enable-lifecycle'
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - monitoring
    restart: unless-stopped

  # ========================================
  # GRAFANA - Visualização de métricas
  # ========================================
  grafana:
    image: grafana/grafana:latest
    container_name: gestor-compras-grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin123
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_SERVER_ROOT_URL=http://localhost:3000
    volumes:
      - grafana-data:/var/lib/grafana
      - ./monitoring/grafana/dashboards:/etc/grafana/provisioning/dashboards
      - ./monitoring/grafana/datasources:/etc/grafana/provisioning/datasources
    networks:
      - monitoring
    restart: unless-stopped
    depends_on:
      - prometheus

  # ========================================
  # ALERTMANAGER - Alertas (Opcional)
  # ========================================
  alertmanager:
    image: prom/alertmanager:latest
    container_name: gestor-compras-alertmanager
    ports:
      - "9093:9093"
    volumes:
      - ./monitoring/alertmanager.yml:/etc/alertmanager/alertmanager.yml
      - alertmanager-data:/alertmanager
    command:
      - '--config.file=/etc/alertmanager/alertmanager.yml'
      - '--storage.path=/alertmanager'
    networks:
      - monitoring
    restart: unless-stopped

  # ========================================
  # POSTGRES EXPORTER - Métricas do PostgreSQL
  # ========================================
  postgres-exporter:
    image: prometheuscommunity/postgres-exporter:latest
    container_name: gestor-compras-postgres-exporter
    ports:
      - "9187:9187"
    environment:
      # Ajuste para o seu banco de dados
      DATA_SOURCE_NAME: "postgresql://postgres:admin@host.docker.internal:5432/gestorcomprasbackend?sslmode=disable"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - monitoring
    restart: unless-stopped

  # ========================================
  # NODE EXPORTER - Métricas do Sistema Operacional
  # ========================================
  node-exporter:
    image: prom/node-exporter:latest
    container_name: gestor-compras-node-exporter
    ports:
      - "9100:9100"
    command:
      - '--path.procfs=/host/proc'
      - '--path.sysfs=/host/sys'
      - '--path.rootfs=/rootfs'
      - '--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)'
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    networks:
      - monitoring
    restart: unless-stopped

  # ========================================
  # LOKI - Agregação de Logs
  # ========================================
  loki:
    image: grafana/loki:latest
    container_name: gestor-compras-loki
    ports:
      - "3100:3100"
    command: -config.file=/etc/loki/local-config.yaml
    volumes:
      - ./monitoring/loki-config.yml:/etc/loki/local-config.yaml
      - loki-data:/loki
    networks:
      - monitoring
    restart: unless-stopped

  # ========================================
  # PROMTAIL - Coletor de Logs
  # ========================================
  promtail:
    image: grafana/promtail:latest
    container_name: gestor-compras-promtail
    volumes:
      - ./monitoring/promtail-config.yml:/etc/promtail/config.yml
      - ./logs:/var/log/app
      - /var/log:/var/log
    command: -config.file=/etc/promtail/config.yml
    networks:
      - monitoring
    restart: unless-stopped

volumes:
  prometheus-data:
  grafana-data:
  alertmanager-data:
  loki-data:

networks:
  monitoring:
    driver: bridge
