# ==============================================================================
# AMBIENTE DE DESENVOLVIMENTO (DEV)
# ==============================================================================
# Configuracoes especificas para desenvolvimento que sobrescrevem application.properties

# --- Logging Detalhado ---
logging.level.com.gestordecompras=DEBUG
logging.level.org.springframework.security=DEBUG

# --- Hibernate Debugging ---
# Mostrar SQL formatado (util para debug, mas pode poluir o console)
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# Mostrar parametros das queries (Binding)
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE

# Estatisticas do Hibernate
spring.jpa.properties.hibernate.generate_statistics=true
logging.level.org.hibernate.stat=DEBUG

# Logar queries lentas (> 1s)
spring.jpa.properties.hibernate.session.events.log.LOG_QUERIES_SLOWER_THAN_MS=1000

# --- Metricas ---
management.metrics.tags.environment=development
