# JWT Secret - usa variável de ambiente ou fallback para desenvolvimento
jwt.secret=${JWT_SECRET:c3VwZXItc2VndXJhLWNoYXZlLWRlLWRlc2Vudm9sdmltZW50by1xdWUtbmFvLWRldmUtc2VyLWNvbXBhcnRpbGhhZGEK}

# Porta do servidor
server.port=8081

spring.datasource.url=jdbc:postgresql://localhost:5432/gestorcomprasbackend
spring.datasource.username=postgres
spring.datasource.password=admin
spring.datasource.driverClassName=org.postgresql.Driver

spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

spring.jpa.hibernate.ddl-auto=none

# ========================================
# CACHE CONFIGURATION
# ========================================
# Tipo de cache: caffeine (em memória, alto desempenho)
spring.cache.type=caffeine
# Configuração do Caffeine (via CacheConfig.java)
spring.cache.caffeine.spec=maximumSize=1000,expireAfterWrite=10m

# ========================================
# HIBERNATE QUERY LOGGING & STATISTICS
# ========================================
# Mostrar SQL queries no console (desenvolvimento)
spring.jpa.show-sql=false
# Formatar SQL queries para melhor legibilidade
spring.jpa.properties.hibernate.format_sql=true
# Mostrar valores dos parâmetros nas queries (útil para debug)
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE
# Habilitar estatísticas do Hibernate (hit ratio do cache L2, queries lentas)
spring.jpa.properties.hibernate.generate_statistics=true
# Log de estatísticas do Hibernate
logging.level.org.hibernate.stat=DEBUG
# Log de queries lentas (> 1 segundo)
spring.jpa.properties.hibernate.session.events.log.LOG_QUERIES_SLOWER_THAN_MS=1000

# ========================================
# DATASOURCE & CONNECTION POOL OPTIMIZATION
# ========================================
# HikariCP: pool de conexões de alta performance
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000

# ========================================
# SPRING BOOT ACTUATOR & PROMETHEUS
# ========================================
# Habilitar todos os endpoints do Actuator
management.endpoints.web.exposure.include=*
# Endpoint base do Actuator
management.endpoints.web.base-path=/actuator
# Porta do Actuator (mesma do servidor para simplicidade)
management.server.port=8081
# Mostrar detalhes de health
management.endpoint.health.show-details=always
# Habilitar métricas do Prometheus
management.metrics.export.prometheus.enabled=true
# Adicionar tags customizadas às métricas
management.metrics.tags.application=gestor-compras
management.metrics.tags.environment=development
# Habilitar métricas do Hibernate
management.metrics.enable.hibernate=true
# Habilitar métricas de JVM
management.metrics.enable.jvm=true
# Habilitar métricas de HTTP
management.metrics.enable.http=true
# Habilitar métricas de cache
management.metrics.enable.cache=true
# Percentis para latência de requests (50%, 95%, 99%)
management.metrics.distribution.percentiles-histogram.http.server.requests=true

# ========================================
# LOGGING CONFIGURATION
# ========================================
# Diretório de logs (caminho absoluto para evitar confusão)
logging.file.path=C:/Users/Administrador/Desktop/gestor-compras/gestor-compras-backend/logs
logging.file.name=C:/Users/Administrador/Desktop/gestor-compras/gestor-compras-backend/logs/gestor-compras.log
# Formato do log (padrão Spring Boot)
logging.pattern.file=%d{yyyy-MM-dd HH:mm:ss.SSS} %5p ${PID:- } --- [%15.15t] %-40.40logger{39} : %m%n%wEx
# Formato do console
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss.SSS} %clr(%5p) %clr(${PID:- }){magenta} %clr(---){faint} %clr([%15.15t]){faint} %clr(%-40.40logger{39}){cyan} %clr(:){faint} %m%n%wEx
# Nível de log padrão
logging.level.root=INFO
logging.level.com.gestordecompras=DEBUG
# Silenciar logs do Spring Security para endpoints do Actuator (scraping do Prometheus)
logging.level.org.springframework.security.web.FilterChainProxy=INFO
logging.level.org.springframework.security.web.authentication.AnonymousAuthenticationFilter=INFO
# Rotação de logs
logging.logback.rollingpolicy.max-file-size=10MB
logging.logback.rollingpolicy.max-history=7
logging.logback.rollingpolicy.total-size-cap=100MB
logging.logback.rollingpolicy.file-name-pattern=C:/Users/Administrador/Desktop/gestor-compras/gestor-compras-backend/logs/gestor-compras.%d{yyyy-MM-dd}.%i.log.gz

