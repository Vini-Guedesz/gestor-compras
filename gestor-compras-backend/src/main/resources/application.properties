# ==============================================================================
# GESTOR DE COMPRAS - CONFIGURACOES GERAIS
# ==============================================================================

# --- Aplicacao ---
spring.application.name=gestor-compras
spring.profiles.active=${SPRING_PROFILES_ACTIVE:dev}

# --- Servidor ---
server.port=${SERVER_PORT:8081}
# server.servlet.context-path=/api

# --- Seguranca (JWT) ---
# OBRIGATORIO: A variavel de ambiente JWT_SECRET deve estar definida
jwt.secret=${JWT_SECRET}

# ==============================================================================
# BANCO DE DADOS & JPA
# ==============================================================================
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/${POSTGRES_DB}}
spring.datasource.username=${POSTGRES_USER}
spring.datasource.password=${POSTGRES_PASSWORD}
spring.datasource.driverClassName=org.postgresql.Driver

spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=none
spring.jpa.open-in-view=false

# Pool de Conexoes (HikariCP)
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000

# ==============================================================================
# CACHE
# ==============================================================================
# Tipo de cache: caffeine (em memoria, alto desempenho)
spring.cache.type=caffeine
spring.cache.caffeine.spec=maximumSize=1000,expireAfterWrite=10m

# ==============================================================================
# MONITORAMENTO E METRICAS (ACTUATOR & PROMETHEUS)
# ==============================================================================
management.endpoints.web.exposure.include=health,info,prometheus,metrics
management.endpoint.health.show-details=always
management.endpoint.health.probes.enabled=true
management.server.port=${server.port}

# Tags e Metricas
management.metrics.tags.application=${spring.application.name}
management.metrics.distribution.percentiles-histogram.http.server.requests=true
management.metrics.distribution.sla.http.server.requests=50ms,100ms,200ms,500ms,1s,5s

# Habilitar metricas detalhadas
management.metrics.enable.hibernate=true
management.metrics.enable.jvm=true
management.metrics.enable.http=true
management.metrics.enable.cache=true

# ==============================================================================
# LOGGING
# ==============================================================================
logging.file.path=${LOG_FILE_PATH:logs}
logging.file.name=${LOG_FILE_NAME:logs/gestor-compras.log}

# Padroes de Log
logging.pattern.file=%d{yyyy-MM-dd HH:mm:ss.SSS} %-5level %thread --- [%-40.40logger{39}] : %msg%n
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss.SSS} %clr(%-5level) %clr(%thread) %clr(---) %clr([%-40.40logger{39}]) %clr(:) %msg%n

# Niveis de Log Padrao
logging.level.root=INFO
logging.level.com.gestordecompras=INFO
# Silenciar logs verbosos de seguranca no Actuator
logging.level.org.springframework.security.web.FilterChainProxy=INFO
logging.level.org.springframework.security.web.authentication.AnonymousAuthenticationFilter=INFO

# Rotacao de Logs
logging.logback.rollingpolicy.max-file-size=10MB
logging.logback.rollingpolicy.max-history=7
logging.logback.rollingpolicy.total-size-cap=100MB
logging.logback.rollingpolicy.file-name-pattern=${LOG_FILE_PATH:logs}/gestor-compras.%d{yyyy-MM-dd}.%i.log.gz
